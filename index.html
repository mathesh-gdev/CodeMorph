<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMorph // AI Code Explainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --accent: #00FFD1;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --border: #222222;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, #0d0d0d, #141414);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--text-main);
            opacity: 0.5;
            font-weight: 300;
        }

        /* Main Layout */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
                height: auto;
                min-height: 100vh;
            }
            main {
                display: flex;
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .left-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                height: 50vh;
                min-height: 300px;
            }
            .right-panel {
                height: auto;
                min-height: 300px;
                padding: 1.5rem;
            }
            header {
                padding: 1rem;
            }
            .logo {
                font-size: 1rem;
            }
            .controls {
                position: sticky;
                bottom: 0;
                padding: 0.75rem 1rem;
                flex-wrap: wrap;
                z-index: 1000;
            }
            #playback-status {
                width: 100%;
                text-align: center;
                margin-top: 0.5rem;
                order: 3;
            }
        }

        .left-panel {
            border-right: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            background-color: var(--surface);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: relative;
        }

        /* Code Editor / View */
        #code-input {
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 2rem;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        #code-display {
            display: none;
            padding: 2rem;
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
            position: relative;
        }

        .code-line {
            display: grid;
            grid-template-columns: 3rem 1fr;
            padding: 4px 0;
            opacity: 0.3;
            transition: var(--transition);
            cursor: pointer;
        }

        .code-line:hover {
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.03);
        }

        .code-line.active {
            opacity: 1;
            background: rgba(0, 255, 209, 0.08);
            border-left: 2px solid var(--accent);
        }

        .line-num {
            color: var(--text-dim);
            text-align: right;
            padding-right: 1.5rem;
            user-select: none;
        }

        /* Explanation Panel */
        .explanation-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        #explanation-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-main);
            font-weight: 300;
        }

        #explanation-content strong {
            color: var(--accent);
            font-weight: 700;
        }

        /* Controls */
        .controls {
            padding: 1rem 2rem;
            border-top: 1px solid var(--border);
            background-color: var(--surface);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        button {
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.6rem 1.5rem;
            font-family: var(--font-mono);
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0, 255, 209, 0.3);
        }

        button:disabled {
            background-color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        #reset-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        #reset-btn:hover {
            color: var(--text-main);
            border-color: var(--text-dim);
        }

        /* Loading Spinner */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--bg);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Overlays & Utility */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 13, 13, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            text-align: center;
            padding: 2rem;
        }

        .overlay p {
            margin-bottom: 1rem;
            color: var(--accent);
        }
    </style>
  <script type="module" crossorigin src="/CodeMorph/assets/index-CEEkWuHt.js"></script>
</head>
<body>

        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <button id="settings-btn" class="nav-btn" style="padding: 0.4rem;" title="API Settings">

            </button>
            <div style="font-size: 0.7rem; color: var(--text-dim)">v2.0.0 - GEMINI POWERED</div>
        </div>
    </header>

    <div id="settings-panel" style="display: none; background: rgba(255,255,255,0.05); margin: 0 1rem 1rem 1rem; padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
        <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05rem;">Custom Gemini API Key</label>
        <div style="display: flex; gap: 0.5rem;">

            <button id="save-key-btn" class="nav-btn" style="background: var(--accent); color: #000;">Save</button>

    </div>

    <main>
        <section class="left-panel">
            <textarea id="code-input" placeholder="// Paste your code here..."></textarea>
            <div id="code-display"></div>

                <p>ANALYZING ARCHITECTURE</p>

    </main>

    <footer class="controls">
        <button id="analyze-btn">
            <span class="spinner"></span>
            Analyze Code
        </button>
        
        <div id="playback-controls" style="display: none; align-items: center; gap: 0.5rem;">
            <button id="prev-btn" class="nav-btn">Prev</button>
            <button id="next-btn" class="nav-btn">Next</button>
        </div>

        <button id="reset-btn" style="display: none;">New Analysis</button>
        
        <div id="playback-status" style="margin-left: auto; font-size: 0.7rem; color: var(--text-dim);"></div>
    </footer>

</body>
</html>
